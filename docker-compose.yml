services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: skynet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skynet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skynet_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-skynet}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skynet}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: skynet-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # --- NestJS API ---
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: skynet-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8081}:${API_PORT:-8081}"
    environment:
      - NODE_ENV=development
      - API_PORT=${API_PORT:-8081}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-skynet}:${POSTGRES_PASSWORD:-skynet_dev_password}@postgres:5432/${POSTGRES_DB:-skynet}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:${WEB_PORT:-8080}
      - PRISMA_SKIP_POSTINSTALL_GENERATE=true
      - PRISMA_GENERATE_SKIP_AUTOINSTALL=true
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - ./prisma:/app/prisma
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend

  # --- Next.js Web ---
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: skynet-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    environment:
      - NODE_ENV=development
      - PORT=${WEB_PORT:-8080}
      - NEXT_PUBLIC_API_URL=http://api:${API_PORT:-8081}
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  pgdata:
  redisdata:
