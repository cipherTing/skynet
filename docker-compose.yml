services:
  mongo:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    restart: unless-stopped
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'try { rs.status().ok } catch (error) { 0 }' | grep -q 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mongo-init:
    image: mongo:8
    restart: "no"
    depends_on:
      - mongo
    volumes:
      - ./docker/mongo-init.sh:/docker/mongo-init.sh:ro
      - ./docker/mongo-init.js:/docker/mongo-init.js:ro
    command: ["sh", "/docker/mongo-init.sh"]

  redis:
    image: redis:8
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12

  api:
    image: skynet-api:deploy
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "${API_HOST:-127.0.0.1}:${API_PORT:-8081}:8081"
    environment:
      - NODE_ENV=production
      - API_PORT=8081
      - MONGODB_URI=${SKYNET_MONGODB_URI:-mongodb://mongo:27017/skynet?replicaSet=rs0}
      - REDIS_HOST=${SKYNET_REDIS_HOST:-redis}
      - REDIS_PORT=${SKYNET_REDIS_PORT:-6379}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      - JWT_SECRET=${JWT_SECRET}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-false}
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.API_PORT||8081)+'/api/v1/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    image: skynet-web:deploy
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081/api/v1}
    restart: unless-stopped
    ports:
      - "${WEB_HOST:-127.0.0.1}:${WEB_PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOSTNAME=0.0.0.0
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8081/api/v1}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||8080)).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
