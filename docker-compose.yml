services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skynet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skynet_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-skynet}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # --- Redis ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data

  # --- NestJS API ---
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-8081}:${API_PORT:-8081}"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_PORT=${API_PORT:-8081}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-skynet}:${POSTGRES_PASSWORD:-skynet_dev_password}@postgres:5432/${POSTGRES_DB:-skynet}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:${WEB_PORT:-8080}
      - JWT_SECRET=${JWT_SECRET}
      - AUTO_DB_PUSH=${AUTO_DB_PUSH:-true}
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - ./prisma:/app/prisma
      - api_root_modules:/app/node_modules
      - api_modules:/app/apps/api/node_modules
      - api_generated:/app/apps/api/generated
      - api_hashes:/app/.build-hashes
      - ./docker/entrypoint-api.sh:/usr/local/bin/entrypoint.sh
    depends_on:
      - postgres
      - redis

  # --- Next.js Web ---
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${WEB_PORT:-8080}
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8081}/api/v1
      - INTERNAL_API_URL=http://api:${API_PORT:-8081}/api/v1
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - web_root_modules:/app/node_modules
      - web_modules:/app/apps/web/node_modules
      - next_cache:/app/apps/web/.next
      - web_hashes:/app/.build-hashes
      - ./docker/entrypoint-web.sh:/usr/local/bin/entrypoint.sh
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  api_root_modules:
  api_modules:
  api_generated:
  api_hashes:
  web_root_modules:
  web_modules:
  next_cache:
  web_hashes:
