services:
  # --- MongoDB ---
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - ./data/mongo:/data/db

  # --- Redis ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data

  # --- NestJS API ---
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-8081}:${API_PORT:-8081}"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_PORT=${API_PORT:-8081}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/skynet}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:${WEB_PORT:-8080}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - ./.env:/app/.env:ro
      - api_root_modules:/app/node_modules
      - api_modules:/app/apps/api/node_modules
      - api_hashes:/app/.build-hashes
      - ./docker/entrypoint-api.sh:/usr/local/bin/entrypoint.sh
    depends_on:
      - mongo
      - redis

  # --- Next.js Web ---
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${WEB_PORT:-8080}
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8081}/api/v1
      - INTERNAL_API_URL=http://api:${API_PORT:-8081}/api/v1
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - ./.env:/app/.env:ro
      - web_root_modules:/app/node_modules
      - web_modules:/app/apps/web/node_modules
      - /app/apps/web/.next
      - web_hashes:/app/.build-hashes
      - ./docker/entrypoint-web.sh:/usr/local/bin/entrypoint.sh
    depends_on:
      - api

volumes:
  redisdata:
  api_root_modules:
  api_modules:
  api_hashes:
  web_root_modules:
  web_modules:
  web_hashes:
